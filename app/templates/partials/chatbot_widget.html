<div class="chatbot-widget" id="chatbotWidget">
    <button class="chatbot-toggle" id="chatbotToggle">
        <span class="chat-icon">💬</span>
    </button>

    <div class="chatbot-panel" id="chatbotPanel">
        <div class="chatbot-header">
            <h3>Trợ lý học tập</h3>
            <button class="chatbot-close" id="chatbotClose">×</button>
        </div>

        <div class="chatbot-messages" id="chatbotMessages">
            <div class="chatbot-message bot">
                <p>Xin chào! Tôi là trợ lý học tập của EduLearn. Bạn có câu hỏi gì về khóa học không?</p>
            </div>
        </div>

        <div class="chatbot-suggestions" id="chatbotSuggestions">
            <button class="suggestion-btn">Khóa học này có những bài học nào?</button>
            <button class="suggestion-btn">Giải thích về nội dung khóa học?</button>
        </div>

        <div class="chatbot-input">
            <input type="text" id="chatbotInput" placeholder="Nhập tin nhắn...">
            <button id="chatbotSend">Gửi</button>
        </div>
    </div>
</div>

<style>
    .chatbot-widget {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 1000;
    }

    .chatbot-toggle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--pink));
        border: none;
        cursor: pointer;
        font-size: 1.5rem;
        box-shadow: var(--shadow-lg);
        transition: transform 0.2s;
    }

    .chatbot-toggle:hover {
        transform: scale(1.1);
    }

    .chatbot-panel {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 380px;
        height: 500px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        display: none;
        flex-direction: column;
        box-shadow: var(--shadow-lg);
    }

    .chatbot-panel.open {
        display: flex;
    }

    .chatbot-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .chatbot-header h3 {
        font-size: 1rem;
        font-weight: 700;
    }

    .chatbot-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.5rem;
        cursor: pointer;
    }

    .chatbot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .chatbot-message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        font-size: 0.9rem;
        line-height: 1.5;
    }

    .chatbot-message.user {
        align-self: flex-end;
        background: var(--accent);
        color: white;
    }

    .chatbot-message.bot {
        align-self: flex-start;
        background: var(--bg-surface);
    }

    .chatbot-suggestions {
        padding: 8px 16px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .suggestion-btn {
        padding: 6px 12px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
    }

    .suggestion-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    .chatbot-input {
        padding: 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
    }

    .chatbot-input input {
        flex: 1;
        padding: 12px 16px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        color: var(--text-primary);
        font-size: 0.9rem;
    }

    .chatbot-input input:focus {
        outline: none;
        border-color: var(--accent);
    }

    .chatbot-input button {
        padding: 12px 20px;
        background: var(--accent);
        border: none;
        border-radius: var(--radius-full);
        color: white;
        font-weight: 600;
        cursor: pointer;
    }

    .chatbot-input button:hover {
        background: var(--accent-hover);
    }

    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: var(--bg-surface);
        border-radius: var(--radius-lg);
        align-self: flex-start;
    }

    .typing-dot {
        width: 8px;
        height: 8px;
        background: var(--text-muted);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
</style>

<script>
    const widget = document.getElementById('chatbotWidget');
    const toggle = document.getElementById('chatbotToggle');
    const panel = document.getElementById('chatbotPanel');
    const closeBtn = document.getElementById('chatbotClose');
    const messagesContainer = document.getElementById('chatbotMessages');
    const input = document.getElementById('chatbotInput');
    const sendBtn = document.getElementById('chatbotSend');
    const suggestions = document.getElementById('chatbotSuggestions');

    let chatHistory = [];

    toggle.addEventListener('click', () => {
        panel.classList.toggle('open');
    });

    closeBtn.addEventListener('click', () => {
        panel.classList.remove('open');
    });

    async function sendMessage(text) {
        addMessage(text, 'user');
        input.value = '';
        showTyping();

        try {
            const courseId = document.body.dataset.courseId;

            const response = await fetch('/chatbot/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    courseId,
                    history: chatHistory
                })
            });

            const data = await response.json();
            hideTyping();

            if (data.success) {
                addMessage(data.reply, 'bot');
                chatHistory = data.history || [];
            } else {
                addMessage('Xin lỗi, đã xảy ra lỗi. Vui lòng thử lại.', 'bot');
            }
        } catch (error) {
            hideTyping();
            addMessage('Xin lỗi, không thể kết nối. Vui lòng thử lại.', 'bot');
        }
    }

    function addMessage(text, role) {
        messagesContainer.innerHTML += `<div class="chatbot-message ${role}"><p>${text}</p></div>`;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showTyping() {
        messagesContainer.innerHTML += '<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function hideTyping() {
        const typing = messagesContainer.querySelector('.typing-indicator');
        if (typing) typing.remove();
    }

    sendBtn.addEventListener('click', () => {
        if (input.value.trim()) {
            sendMessage(input.value.trim());
        }
    });

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            sendMessage(input.value.trim());
        }
    });

    document.querySelectorAll('.suggestion-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            sendMessage(btn.textContent);
        });
    });
</script>
