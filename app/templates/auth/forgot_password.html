<!DOCTYPE html>
{% extends "base.html" %}

{% block title %}Quên mật khẩu - EduLearn{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="logo">📚 EduLearn</a>
            <h1>Quên mật khẩu</h1>
            <p>Nhập email để khôi phục mật khẩu</p>
        </div>

        <form id="forgotPasswordForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required 
                       placeholder="nhập@email.com" autocomplete="email">
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                Gửi liên kết khôi phục
            </button>

            <div class="form-footer">
                <a href="/auth/login">Quay lại đăng nhập</a>
            </div>
        </form>

        <div id="message" class="message" style="display: none;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = {{ firebase_web_config | tojson }};
    if (!firebaseConfig.apiKey || firebaseConfig.apiKey === '') {
        console.error('Firebase config not loaded');
    }
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const submitBtn = document.getElementById('submitBtn');
        const message = document.getElementById('message');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Đang gửi...';
        message.style.display = 'none';

        try {
            await auth.sendPasswordResetEmail(email);
            
            message.textContent = 'Đã gửi liên kết khôi phục mật khẩu đến email của bạn. Vui lòng kiểm tra hộp thư.';
            message.className = 'message success';
            message.style.display = 'block';
            
            document.getElementById('forgotPasswordForm').reset();
        } catch (error) {
            console.error('Password reset error:', error);
            
            let errorMessage = 'Đã xảy ra lỗi. Vui lòng thử lại.';
            
            if (error.code === 'auth/invalid-email') {
                errorMessage = 'Email không hợp lệ.';
            } else if (error.code === 'auth/user-not-found') {
                errorMessage = 'Không tìm thấy tài khoản với email này.';
            } else if (error.code === 'auth/too-many-requests') {
                errorMessage = 'Quá nhiều yêu cầu. Vui lòng thử lại sau.';
            }
            
            message.textContent = errorMessage;
            message.className = 'message error';
            message.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Gửi liên kết khôi phục';
        }
    });
</script>
{% endblock %}
