<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EduLearn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 0 30px rgba(79, 156, 249, 0.3);
        }
        .auth-logo-text {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .auth-logo-text span {
            color: var(--accent);
        }
        .auth-title {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form .form-group {
            margin-bottom: 0;
        }
        .auth-form .form-input {
            padding: 14px 16px;
            font-size: 0.95rem;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            margin-top: 8px;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .auth-social {
            display: flex;
            gap: 12px;
        }
        .auth-social-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-social-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--border-hover);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .auth-error {
            background: var(--red-light);
            color: var(--red);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            display: none;
        }
        .auth-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">📚</div>
                <div class="auth-logo-text">Edu<span>Learn</span></div>
            </div>

            <h1 class="auth-title">Chào mừng trở lại!</h1>
            <p class="auth-subtitle">Đăng nhập để tiếp tục học tập</p>

            <div class="auth-error" id="authError"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="nhập@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">
                    Đăng nhập
                </button>
            </form>

            <div class="auth-divider">hoặc</div>

            <div class="auth-social">
                <button type="button" class="auth-social-btn" id="googleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
            </div>

            <p class="auth-footer">
                <a href="{{ url_for('auth.forgot_password_page') }}" class="forgot-password">Quên mật khẩu?</a>
            </p>
            <p class="auth-footer">
                Chưa có tài khoản? <a href="{{ url_for('auth.register_page') }}">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {{ firebase_web_config | tojson }};
        if (!firebaseConfig.apiKey || firebaseConfig.apiKey === '') {
            console.error('Firebase Web API Key chưa được cấu hình. Thêm FIREBASE_WEB_API_KEY vào file .env');
        }
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const errorDiv = document.getElementById('authError');

        // Email/Password Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Vui lòng nhập email và mật khẩu');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang đăng nhập...';

            try {
                // Firebase login
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const idToken = await userCredential.user.getIdToken();

                // Send to backend
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Đăng nhập thất bại');
                }

                // Redirect based on role
                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else if (data.role === 'instructor') {
                    window.location.href = '/instructor/dashboard';
                } else {
                    window.location.href = '/dashboard';
                }

            } catch (error) {
                console.error('Login error:', error);
                const code = (error && error.code) || (error && error.message) || '';
                showError(getErrorMessage(code));
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng nhập';
            }
        });

        // Google Login
        googleBtn.addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            loginBtn.disabled = true;
            loginBtn.textContent = 'Đang đăng nhập...';

            try {
                const result = await auth.signInWithPopup(provider);
                const idToken = await result.user.getIdToken();

                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Đăng nhập thất bại');
                }

                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else if (data.role === 'instructor') {
                    window.location.href = '/instructor/dashboard';
                } else {
                    window.location.href = '/dashboard';
                }

            } catch (error) {
                console.error('Google login error:', error);
                const code = (error && error.code) || (error && error.message) || '';
                showError(getErrorMessage(code));
                loginBtn.disabled = false;
                loginBtn.textContent = 'Đăng nhập';
            }
        });

        function showError(message) {
            errorDiv.textContent = (message != null && message !== '') ? String(message) : 'Đã xảy ra lỗi, vui lòng thử lại';
            errorDiv.classList.add('show');
        }

        function getErrorMessage(errorCode) {
            if (errorCode == null || errorCode === '') return 'Đã xảy ra lỗi, vui lòng thử lại';
            const messages = {
                'auth/api-key-not-valid': 'Firebase API Key chưa cấu hình. Kiểm tra file .env và thêm FIREBASE_WEB_API_KEY (lấy từ Firebase Console).',
                'auth/user-not-found': 'Tài khoản không tồn tại',
                'auth/wrong-password': 'Mật khẩu không đúng',
                'auth/invalid-email': 'Email không hợp lệ',
                'auth/user-disabled': 'Tài khoản đã bị vô hiệu hóa',
                'auth/too-many-requests': 'Quá nhiều lần thử, vui lòng thử lại sau',
                'auth/network-request-failed': 'Lỗi kết nối mạng'
            };
            const codeStr = String(errorCode);
            if (messages[codeStr]) return messages[codeStr];
            for (const key in messages) {
                if (codeStr.indexOf(key) !== -1) return messages[key];
            }
            return codeStr || 'Đã xảy ra lỗi, vui lòng thử lại';
        }
    </script>
</body>
</html>
