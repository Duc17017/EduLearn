<!DOCTYPE html>
{% extends "base.html" %}

{% block title %}Quản lý Users - EduLearn{% endblock %}

{% block content %}
<div class="admin-users">
    <div class="page-header">
        <h1>Quản lý Users</h1>
        <a href="{{ url_for('main.admin_dashboard') }}" class="btn btn-ghost">
            ← Quay lại
        </a>
    </div>

    <div class="users-table-container">
        <table class="users-table">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                    <th>Ngày tạo</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <tr>
                    <td colspan="6" style="text-align: center;">Đang tải...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<style>
.admin-users {
    padding: 2rem;
}
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
}
.page-header h1 {
    font-size: 1.8rem;
}
.users-table-container {
    background: var(--card-bg, #fff);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.users-table {
    width: 100%;
    border-collapse: collapse;
}
.users-table th,
.users-table td {
    padding: 1rem;
    text-align: left;
    border-bottom: 1px solid #eee;
}
.users-table th {
    background: #f8f9fa;
    font-weight: 600;
    color: #333;
}
.users-table tr:last-child td {
    border-bottom: none;
}
.users-table tr:hover {
    background: #f8f9fa;
}
.role-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
}
.role-badge.student {
    background: #e3f2fd;
    color: #1565c0;
}
.role-badge.instructor {
    background: #fff3e0;
    color: #e65100;
}
.role-badge.admin {
    background: #fce4ec;
    color: #c2185b;
}
.action-buttons {
    display: flex;
    gap: 0.5rem;
}
.btn-sm {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
}
.btn-promote {
    background: #4CAF50;
    color: white;
}
.btn-promote:hover {
    background: #45a049;
}
.btn-delete {
    background: #f44336;
    color: white;
}
.btn-delete:hover {
    background: #da190b;
}
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.modal.active {
    display: flex;
}
.modal-content {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    max-width: 400px;
    width: 90%;
}
.modal h3 {
    margin-bottom: 1rem;
}
.modal-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
}
</style>

<!-- Role Modal -->
<div class="modal" id="roleModal">
    <div class="modal-content">
        <h3>Thay đổi vai trò</h3>
        <p id="modalUserName"></p>
        <select id="newRoleSelect" class="form-control">
            <option value="student">Student</option>
            <option value="instructor">Instructor</option>
            <option value="admin">Admin</option>
        </select>
        <input type="hidden" id="targetUserUid">
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
            <button class="btn btn-primary" onclick="confirmRoleChange()">Xác nhận</button>
        </div>
    </div>
</div>

<script>
let users = [];

async function loadUsers() {
    try {
        const response = await fetch('/auth/admin/users');
        const data = await response.json();

        if (data.error) {
            alert(data.message);
            return;
        }

        users = data.users || [];
        renderUsers();
        updateStats();
    } catch (error) {
        console.error('Error loading users:', error);
        document.getElementById('usersTableBody').innerHTML = 
            '<tr><td colspan="6" style="text-align: center; color: red;">Lỗi tải dữ liệu</td></tr>';
    }
}

function renderUsers() {
    const tbody = document.getElementById('usersTableBody');
    
    if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Chưa có user nào</td></tr>';
        return;
    }

    tbody.innerHTML = users.map((user, index) => `
        <tr>
            <td>${index + 1}</td>
            <td>${user.name || 'Chưa có tên'}</td>
            <td>${user.email || '-'}</td>
            <td><span class="role-badge ${user.role}">${getRoleLabel(user.role)}</span></td>
            <td>${formatDate(user.createdAt)}</td>
            <td>
                <div class="action-buttons">
                    <button class="btn btn-sm btn-promote" onclick="openRoleModal('${user.uid}', '${user.name}', '${user.role}')">
                        Đổi vai trò
                    </button>
                    ${user.role !== 'admin' ? `
                    <button class="btn btn-sm btn-delete" onclick="deleteUser('${user.uid}', '${user.name}')">
                        Xóa
                    </button>
                    ` : ''}
                </div>
            </td>
        </tr>
    `).join('');
}

function getRoleLabel(role) {
    const labels = {
        'student': 'Học viên',
        'instructor': 'Giảng viên',
        'admin': 'Admin'
    };
    return labels[role] || role;
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('vi-VN');
    } catch {
        return '-';
    }
}

function updateStats() {
    const total = users.length;
    const students = users.filter(u => u.role === 'student').length;
    const instructors = users.filter(u => u.role === 'instructor').length;
    const admins = users.filter(u => u.role === 'admin').length;

    document.getElementById('totalUsers').textContent = total;
    document.getElementById('totalStudents').textContent = students;
    document.getElementById('totalInstructors').textContent = instructors;
    document.getElementById('totalAdmins').textContent = admins;
}

function openRoleModal(uid, name, currentRole) {
    document.getElementById('targetUserUid').value = uid;
    document.getElementById('modalUserName').textContent = `User: ${name}`;
    document.getElementById('newRoleSelect').value = currentRole;
    document.getElementById('roleModal').classList.add('active');
}

function closeModal() {
    document.getElementById('roleModal').classList.remove('active');
}

async function confirmRoleChange() {
    const uid = document.getElementById('targetUserUid').value;
    const newRole = document.getElementById('newRoleSelect').value;

    try {
        const response = await fetch('/auth/admin/update-user-role', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid, role: newRole })
        });

        const data = await response.json();

        if (data.success) {
            alert(data.message);
            closeModal();
            loadUsers();
        } else {
            alert(data.message || 'Lỗi cập nhật vai trò');
        }
    } catch (error) {
        alert('Lỗi kết nối');
    }
}

async function deleteUser(uid, name) {
    if (!confirm(`Bạn có chắc muốn xóa user "${name}"?`)) {
        return;
    }

    try {
        const response = await fetch('/auth/admin/delete-user', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid })
        });

        const data = await response.json();

        if (data.success) {
            alert(data.message);
            loadUsers();
        } else {
            alert(data.message || 'Lỗi xóa user');
        }
    } catch (error) {
        alert('Lỗi kết nối');
    }
}

// Load users on page load
document.addEventListener('DOMContentLoaded', loadUsers);
</script>
{% endblock %}
