<!DOCTYPE html>
{% extends "base.html" %}

{% block title %}Admin Dashboard - EduLearn{% endblock %}

{% block content %}
<div class="admin-dashboard">
    <div class="page-header">
        <h1>Admin Dashboard</h1>
        <p>Quản lý hệ thống</p>
    </div>

    <div class="admin-stats">
        <div class="stat-card">
            <h3>Tổng Users</h3>
            <p class="stat-number" id="totalUsers">-</p>
        </div>
        <div class="stat-card">
            <h3>Students</h3>
            <p class="stat-number" id="totalStudents">-</p>
        </div>
        <div class="stat-card">
            <h3>Instructors</h3>
            <p class="stat-number" id="totalInstructors">-</p>
        </div>
        <div class="stat-card">
            <h3>Admins</h3>
            <p class="stat-number" id="totalAdmins">-</p>
        </div>
    </div>

    <div class="admin-actions">
        <a href="{{ url_for('main.admin_users') }}" class="btn btn-primary">
            Quản lý Users
        </a>
    </div>
</div>

<style>
.admin-dashboard {
    padding: 2rem;
}
.admin-dashboard .page-header {
    margin-bottom: 2rem;
}
.admin-dashboard .page-header h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
}
.admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
}
.stat-card {
    background: var(--card-bg, #fff);
    padding: 1.5rem;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.stat-card h3 {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 0.5rem;
}
.stat-number {
    font-size: 2rem;
    font-weight: bold;
    color: var(--primary-color, #4F46E5);
}
.admin-actions {
    display: flex;
    gap: 1rem;
}
</style>
{% endblock %}
